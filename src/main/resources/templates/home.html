<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring MVC Home</title>
    <style>
        :root {
            --bg-start: #0b1020;
            --bg-end: #16213e;
            --card: rgba(255, 255, 255, 0.12);
            --text: #f4f8ff;
            --muted: #cdd8f3;
            --accent: #6ee7ff;
            --accent-2: #8b5cf6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, #1f3b73, transparent 40%),
                        radial-gradient(circle at bottom right, #552f8f, transparent 45%),
                        linear-gradient(145deg, var(--bg-start), var(--bg-end));
            padding: 24px;
        }

        .card {
            width: min(720px, 100%);
            border-radius: 20px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            padding: 36px 30px;
            animation: fadeInUp 0.8s ease;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #0b1020;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 999px;
            letter-spacing: 0.3px;
            font-size: 0.85rem;
        }

        h1 {
            margin: 16px 0 12px;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            line-height: 1.2;
        }

        .hello {
            margin: 0;
            font-size: clamp(1.2rem, 2.8vw, 1.6rem);
            color: var(--accent);
            font-weight: 700;
        }

        .subtext {
            margin: 14px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<section class="card">
    <span class="badge">Spring Boot MVC</span>
    <h1 th:text="${welcomeMessage.message}">Welcome to Spring MVC Application</h1>
    <p class="hello">Hello World</p>
    <p class="subtext">Your application is running successfully with a modern Thymeleaf-powered UI.</p>
</section>
</body>
</html>
